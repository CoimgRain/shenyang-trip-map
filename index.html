<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>沈阳五一行程地图</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      color-scheme: light;
      --bg: #ebe2d3;
      --paper: rgba(251, 246, 237, 0.94);
      --paper-solid: #faf4ea;
      --ink: #241d16;
      --muted: #756656;
      --line: rgba(74, 55, 28, 0.12);
      --accent: #b16d22;
      --accent-soft: rgba(177, 109, 34, 0.14);
      --shadow: 0 22px 50px rgba(49, 33, 14, 0.18);
      --panel-offset: 0px;
      --day-color: #d84f45;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(199, 150, 82, 0.28), transparent 28%),
        linear-gradient(180deg, #f4ede1 0%, #e7dccb 100%);
      color: var(--ink);
      font-family: "PingFang SC", "Noto Serif SC", "Hiragino Sans GB", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(92, 62, 21, 0.04) 0 1px, transparent 1px 100%),
        linear-gradient(rgba(92, 62, 21, 0.03) 0 1px, transparent 1px 100%);
      background-size: 28px 28px;
      opacity: 0.22;
    }

    .app-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, 460px);
      height: 100vh;
      isolation: isolate;
    }

    .map-stage {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background: #d9ccb8;
    }

    #map {
      width: 100%;
      height: 100%;
      filter: saturate(0.98) contrast(1.01);
    }

    .map-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(34, 25, 16, 0.18) 0%, rgba(34, 25, 16, 0.02) 32%, rgba(34, 25, 16, 0.12) 100%);
    }

    .map-label {
      background: rgba(252, 248, 241, 0.94);
      border: 1px solid rgba(72, 53, 30, 0.14);
      border-radius: 12px;
      color: #3b2c1d;
      box-shadow: 0 10px 22px rgba(61, 43, 18, 0.1);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 4px 8px;
    }

    .leaflet-tooltip-top::before,
    .leaflet-tooltip-bottom::before,
    .leaflet-tooltip-left::before,
    .leaflet-tooltip-right::before {
      border: none !important;
    }

    .day-marker {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border: 2px solid rgba(255, 249, 239, 0.94);
      box-shadow: 0 10px 20px rgba(43, 28, 13, 0.18);
    }

    .panel {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 24px 24px 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(201, 152, 86, 0.2), transparent 24%),
        linear-gradient(180deg, rgba(252, 247, 239, 0.98) 0%, rgba(243, 234, 220, 0.98) 100%);
      border-left: 1px solid rgba(84, 60, 28, 0.08);
      box-shadow: -18px 0 38px rgba(38, 25, 12, 0.08);
      backdrop-filter: blur(18px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 18px 18px 18px 0;
      pointer-events: none;
      border-radius: 28px;
      border: 1px solid rgba(123, 88, 44, 0.08);
      opacity: 0.6;
    }

    .panel-handle {
      display: none;
    }

    .panel-top {
      position: relative;
      z-index: 1;
      padding-right: 4px;
    }

    .panel-kicker {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(110, 87, 58, 0.72);
    }

    .panel-title {
      margin: 10px 0 6px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .day-tabs {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 10px;
      padding: 0 0 14px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .day-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      padding: 11px 14px;
      border: 1px solid rgba(72, 53, 30, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #3b2f21;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .day-tab:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 18px rgba(57, 39, 17, 0.08);
    }

    .day-tab.is-active {
      background: color-mix(in srgb, var(--day-color) 12%, rgba(255, 249, 241, 0.96));
      border-color: color-mix(in srgb, var(--day-color) 52%, rgba(72, 53, 30, 0.08));
      box-shadow: 0 12px 20px rgba(57, 39, 17, 0.1);
    }

    .day-tab-label {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .day-content {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }

    .day-content-inner {
      padding-bottom: 28px;
    }

    .day-header {
      padding: 20px 22px 22px;
      border-radius: 30px;
      color: #fff8f2;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--day-color) 92%, #664226 8%), color-mix(in srgb, var(--day-color) 68%, #22170d 32%)),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.22), transparent 34%);
      box-shadow: var(--shadow);
    }

    .day-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .day-header-kicker {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 243, 228, 0.82);
    }

    .day-header-title {
      margin: 0;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(28px, 3vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .day-header-summary {
      margin: 12px 0 0;
      max-width: 30rem;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(255, 243, 228, 0.9);
    }

    .day-route {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .route-pill {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 241, 226, 0.18);
      background: rgba(255, 248, 240, 0.1);
      font-size: 12px;
      color: rgba(255, 243, 228, 0.94);
    }

    .day-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255, 248, 240, 0.14);
      border: 1px solid rgba(255, 241, 226, 0.18);
      font-size: 12px;
      color: rgba(255, 243, 228, 0.96);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .badge-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .info-card {
      padding: 16px 16px 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(74, 55, 28, 0.08);
      box-shadow: 0 12px 24px rgba(52, 36, 17, 0.05);
    }

    .info-card.full {
      grid-column: 1 / -1;
    }

    .info-label {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(100, 78, 51, 0.66);
    }

    .info-card p,
    .info-card li {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #342a22;
    }

    .info-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--day-color) 14%, #fff);
      border: 1px solid color-mix(in srgb, var(--day-color) 26%, rgba(74, 55, 28, 0.08));
      font-size: 12px;
      color: #49351d;
    }

    .section-block {
      margin-top: 18px;
      padding: 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(72, 53, 30, 0.08);
      box-shadow: 0 14px 30px rgba(54, 37, 16, 0.06);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 21px;
      letter-spacing: -0.03em;
    }

    .section-note {
      font-size: 12px;
      color: var(--muted);
    }

    .transit-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .transit-item + .transit-item {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(72, 53, 30, 0.1);
    }

    .transit-title {
      font-size: 14px;
      font-weight: 700;
      color: #3d2f20;
    }

    .transit-copy {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.7;
      color: #665748;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .gallery-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: #d8cab6;
      min-height: 154px;
    }

    .gallery-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.26s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.03);
    }

    .gallery-card::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 48%;
      background: linear-gradient(180deg, transparent, rgba(19, 11, 5, 0.3));
      pointer-events: none;
    }

    .gallery-caption {
      position: absolute;
      inset: auto 12px 12px;
      z-index: 1;
      font-size: 12px;
      color: rgba(255, 248, 240, 0.95);
      text-shadow: 0 2px 10px rgba(12, 6, 2, 0.4);
    }

    .markdown-body {
      font-size: 14px;
      line-height: 1.85;
      color: #2f261f;
    }

    .markdown-body > *:first-child {
      margin-top: 0;
    }

    .markdown-body h3,
    .markdown-body h4 {
      margin: 18px 0 8px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      line-height: 1.28;
      letter-spacing: -0.02em;
      color: #241c15;
    }

    .markdown-body h3 {
      font-size: 21px;
    }

    .markdown-body h4 {
      font-size: 17px;
    }

    .markdown-body p {
      margin: 8px 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 8px 0 12px;
      padding-left: 20px;
    }

    .markdown-body li + li {
      margin-top: 5px;
    }

    .markdown-body blockquote {
      margin: 12px 0;
      padding: 12px 14px;
      border-left: 3px solid color-mix(in srgb, var(--day-color) 44%, rgba(72, 53, 30, 0.1));
      border-radius: 16px;
      background: color-mix(in srgb, var(--day-color) 8%, #fff);
      color: #5e5143;
    }

    .markdown-body a {
      color: #8d4f16;
      text-decoration: none;
      border-bottom: 1px solid rgba(141, 79, 22, 0.24);
    }

    .markdown-body strong {
      color: #1f1610;
    }

    .source-card {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 250, 244, 0.78);
      border: 1px solid rgba(72, 53, 30, 0.08);
      font-size: 13px;
      line-height: 1.7;
      color: #625445;
    }

    .source-card code {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(88, 61, 24, 0.07);
      color: #5b4529;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }

    @media (max-width: 1020px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .panel {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: min(72vh, 760px);
        padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
        border-left: none;
        border-top: 1px solid rgba(84, 60, 28, 0.08);
        border-radius: 28px 28px 0 0;
        box-shadow: 0 -18px 42px rgba(38, 25, 12, 0.14);
        transform: translateY(var(--panel-offset, 0px));
        transition: transform 0.28s ease;
        will-change: transform;
        touch-action: pan-x;
      }

      .panel::before {
        inset: 14px 14px 10px;
      }

      .panel.is-dragging {
        transition: none;
      }

      .panel.is-collapsed .day-content {
        pointer-events: none;
      }

      .panel-handle {
        display: block;
        width: 48px;
        height: 5px;
        margin: 0 auto 10px;
        border-radius: 999px;
        background: rgba(102, 82, 56, 0.34);
      }

      .hero-card {
        display: none;
      }

      .panel-title {
        font-size: 24px;
      }

      .panel-top {
        display: none;
      }

      .day-tab {
        min-width: 84px;
        padding: 10px 12px;
      }

      .day-content {
        padding-right: 0;
      }

      .day-header {
        padding: 18px;
        border-radius: 24px;
      }

      .day-header-title {
        font-size: clamp(23px, 6vw, 31px);
        line-height: 1.12;
      }

      .info-grid,
      .gallery {
        grid-template-columns: 1fr;
      }

      .section-block {
        border-radius: 22px;
      }
    }

    @media (max-width: 640px) {
      .panel {
        height: min(76vh, 820px);
      }

      .source-row {
        margin-bottom: 8px;
      }

      .day-header-top {
        display: block;
      }

      .badge-stack {
        margin-top: 12px;
        justify-content: flex-start;
      }

      .day-header-summary {
        max-width: none;
        margin-top: 10px;
      }

      .day-header-title {
        max-width: none;
        text-wrap: pretty;
      }

      .day-route {
        gap: 6px;
      }

      .route-pill,
      .day-badge {
        font-size: 11px;
      }

      .source-pill {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="map-stage">
      <div id="map"></div>
    </section>

    <aside class="panel" aria-label="行程详情面板">
      <div class="panel-handle" aria-hidden="true"></div>
      <div class="day-tabs" id="day-tabs"></div>

      <div class="day-content">
        <div class="day-content-inner">
          <section class="day-header">
            <div class="day-header-top">
              <div>
                <p class="day-header-kicker" id="day-kicker">Day 1 · 市中心轻量开局</p>
                <h3 class="day-header-title" id="day-title">到站、放包、中山广场、中山路、西塔</h3>
                <p class="day-header-summary" id="day-summary"></p>
              </div>
              <div class="badge-stack">
                <span class="day-badge" id="crowd-badge"></span>
                <span class="day-badge" id="mood-badge"></span>
              </div>
            </div>
            <div class="day-route" id="day-route"></div>
          </section>

          <section class="info-grid">
            <div class="info-card">
              <p class="info-label">交通建议</p>
              <p id="transport-note"></p>
            </div>
            <div class="info-card">
              <p class="info-label">吃什么</p>
              <div class="chips" id="food-chips"></div>
            </div>
            <div class="info-card full">
              <p class="info-label">重点玩法</p>
              <div class="chips" id="highlight-chips"></div>
            </div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h4 class="section-title">当天交通线</h4>
              <span class="section-note">优先地铁，必要时补短打车</span>
            </div>
            <ul class="transit-list" id="transit-list"></ul>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h4 class="section-title">当天照片</h4>
              <span class="section-note">来自知识库已整理附件</span>
            </div>
            <div class="gallery" id="photo-gallery"></div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h4 class="section-title">当天详细说明</h4>
              <span class="section-note">会跟随 D1-D5 同步刷新</span>
            </div>
            <article class="markdown-body" id="day-article"></article>
          </section>

          <section class="source-card" id="source-card"></section>
        </div>
      </div>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="trip-data.js"></script>
  <script>
    const data = window.TRIP_DATA;
    const map = L.map("map", {
      zoomControl: false,
      attributionControl: true
    }).setView([41.8035, 123.4145], 12);

    L.control.zoom({ position: "bottomright" }).addTo(map);

    L.tileLayer(
      "https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}",
      {
        subdomains: ["1", "2", "3", "4"],
        maxZoom: 18,
        attribution: "Tiles &copy; 高德地图"
      }
    ).addTo(map);

    const $ = (id) => document.getElementById(id);
    const panel = document.querySelector(".panel");
    const panelHandle = document.querySelector(".panel-handle");
    const dayTabs = $("day-tabs");
    $("source-card").innerHTML = `这份网页当前读取的是知识库里的 <code>${escapeHtml(data.meta.sourceNote)}</code>。以后你只要改这份笔记，再让我执行一次同步脚本，网站内容就会一起刷新。最近同步时间：<code>${escapeHtml(data.meta.generatedAt)}</code>`;

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderInline(text) {
      let value = escapeHtml(text);
      value = value.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      value = value.replace(/`([^`]+)`/g, "<code>$1</code>");
      value = value.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      return value;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r/g, "").split("\n");
      const html = [];
      let paragraph = [];
      let listType = null;
      let listItems = [];
      let quoteLines = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        html.push(`<p>${renderInline(paragraph.join("<br />"))}</p>`);
        paragraph = [];
      }

      function flushList() {
        if (!listType || !listItems.length) return;
        html.push(`<${listType}>${listItems.map((item) => `<li>${renderInline(item)}</li>`).join("")}</${listType}>`);
        listType = null;
        listItems = [];
      }

      function flushQuote() {
        if (!quoteLines.length) return;
        html.push(`<blockquote>${quoteLines.map((line) => `<p>${renderInline(line)}</p>`).join("")}</blockquote>`);
        quoteLines = [];
      }

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          flushParagraph();
          flushList();
          flushQuote();
          continue;
        }

        if (line.startsWith("> ")) {
          flushParagraph();
          flushList();
          quoteLines.push(line.slice(2));
          continue;
        }

        if (/^####\s+/.test(line)) {
          flushParagraph();
          flushList();
          flushQuote();
          html.push(`<h4>${renderInline(line.replace(/^####\s+/, ""))}</h4>`);
          continue;
        }

        if (/^###\s+/.test(line)) {
          flushParagraph();
          flushList();
          flushQuote();
          html.push(`<h3>${renderInline(line.replace(/^###\s+/, ""))}</h3>`);
          continue;
        }

        if (/^\d+\.\s+/.test(line)) {
          flushParagraph();
          flushQuote();
          const item = line.replace(/^\d+\.\s+/, "");
          if (listType !== "ol") {
            flushList();
            listType = "ol";
          }
          listItems.push(item);
          continue;
        }

        if (/^- /.test(line)) {
          flushParagraph();
          flushQuote();
          const item = line.replace(/^- /, "");
          if (listType !== "ul") {
            flushList();
            listType = "ul";
          }
          listItems.push(item);
          continue;
        }

        flushList();
        flushQuote();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      flushQuote();
      return html.join("");
    }

    const panelState = {
      offset: 0,
      collapsedOffset: 0,
      collapsed: false,
      dragging: false,
      pointerId: null,
      startY: 0,
      startOffset: 0
    };

    function isMobilePanelMode() {
      return window.matchMedia("(max-width: 1020px)").matches;
    }

    function getPanelPeekHeight() {
      return 128;
    }

    function setPanelOffset(offset, resetScroll = false) {
      const clamped = Math.max(0, Math.min(offset, panelState.collapsedOffset));
      panelState.offset = clamped;
      panelState.collapsed = clamped > panelState.collapsedOffset * 0.5;
      panel.style.setProperty("--panel-offset", `${clamped}px`);
      panel.classList.toggle("is-collapsed", panelState.collapsed);
      if (resetScroll) {
        panel.querySelector(".day-content").scrollTop = 0;
      }
    }

    function updatePanelMetrics() {
      if (!isMobilePanelMode()) {
        panelState.collapsedOffset = 0;
        setPanelOffset(0);
        return;
      }
      panelState.collapsedOffset = Math.max(0, panel.offsetHeight - getPanelPeekHeight());
      setPanelOffset(panelState.collapsed ? panelState.collapsedOffset : 0);
    }

    function snapPanel(collapsed) {
      setPanelOffset(collapsed ? panelState.collapsedOffset : 0, collapsed);
    }

    function canDragPanel(target) {
      if (!isMobilePanelMode()) return false;
      if (panelState.collapsed) return true;
      if (target.closest(".panel-handle") || target.closest(".panel-top") || target.closest(".day-tabs")) {
        return true;
      }
      return panel.querySelector(".day-content").scrollTop <= 0;
    }

    panel.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && !event.target.closest(".panel-handle")) return;
      if (!canDragPanel(event.target)) return;
      panelState.dragging = true;
      panelState.pointerId = event.pointerId;
      panelState.startY = event.clientY;
      panelState.startOffset = panelState.offset;
      panel.classList.add("is-dragging");
    });

    panel.addEventListener("pointermove", (event) => {
      if (!panelState.dragging || event.pointerId !== panelState.pointerId) return;
      const deltaY = event.clientY - panelState.startY;
      const contentAtTop = panel.querySelector(".day-content").scrollTop <= 0;
      if (panelState.collapsed || contentAtTop || panelState.startOffset > 0 || deltaY < 0) {
        event.preventDefault();
        setPanelOffset(panelState.startOffset + deltaY);
      }
    });

    function endPanelDrag(event) {
      if (!panelState.dragging || event.pointerId !== panelState.pointerId) return;
      panelState.dragging = false;
      panel.classList.remove("is-dragging");
      const shouldCollapse = panelState.offset > panelState.collapsedOffset * 0.42;
      snapPanel(shouldCollapse);
      panelState.pointerId = null;
    }

    panel.addEventListener("pointerup", endPanelDrag);
    panel.addEventListener("pointercancel", endPanelDrag);
    panelHandle.addEventListener("click", () => snapPanel(!panelState.collapsed));
    window.addEventListener("resize", updatePanelMetrics);

    function iconHtml(color, num) {
      return `<div class="day-marker" style="background:${color}">${num}</div>`;
    }

    function tooltipOffset(dayIndex, pointIndex) {
      const offsets = [
        [0, -14], [0, 20], [22, 0], [-22, 0], [16, -18], [-18, 18]
      ];
      return offsets[(dayIndex + pointIndex) % offsets.length];
    }

    const mapLayers = [];
    const allBounds = [];

    data.days.forEach((day, dayIndex) => {
      const latlngs = day.points.map((point, pointIndex) => {
        const latlng = L.latLng(point.lat, point.lon);
        allBounds.push(latlng);
        const marker = L.marker(latlng, {
          icon: L.divIcon({
            className: "",
            html: iconHtml(day.color, pointIndex + 1),
            iconSize: [30, 30],
            iconAnchor: [15, 15]
          })
        })
          .addTo(map)
          .bindTooltip(`${day.label} · ${pointIndex + 1}. ${point.name}`, {
            permanent: true,
            direction: "top",
            offset: tooltipOffset(dayIndex, pointIndex),
            className: "map-label"
          });
        return { marker, latlng };
      });

      const polyline = L.polyline(latlngs.map((item) => item.latlng), {
        color: day.color,
        weight: 4,
        opacity: 0.82,
        smoothFactor: 1,
        dashArray: day.dashed ? "10 8" : null
      }).addTo(map);

      mapLayers.push({
        dayIndex,
        day,
        markers: latlngs.map((item) => item.marker),
        bounds: L.latLngBounds(latlngs.map((item) => item.latlng)),
        polyline
      });
    });

    function getFitOptions() {
      if (isMobilePanelMode()) {
        return {
          paddingTopLeft: [22, 22],
          paddingBottomRight: [22, Math.max(164, panel.offsetHeight + 16)],
          maxZoom: 14,
          duration: 0.65
        };
      }

      return {
        paddingTopLeft: [50, 50],
        paddingBottomRight: [50, 50],
        maxZoom: 14,
        duration: 0.65
      };
    }

    let activeDay = 0;

    function renderChips(container, items) {
      container.innerHTML = "";
      items.forEach((item) => {
        const span = document.createElement("span");
        span.className = "chip";
        span.textContent = item;
        container.appendChild(span);
      });
    }

    function renderTransit(items) {
      const list = $("transit-list");
      list.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        li.className = "transit-item";
        li.innerHTML = `
          <div class="transit-title">${escapeHtml(item.title)}</div>
          <div class="transit-copy">${escapeHtml(item.copy)}</div>
        `;
        list.appendChild(li);
      });
    }

    function renderGallery(day) {
      const gallery = $("photo-gallery");
      gallery.innerHTML = "";
      day.photos.forEach((photo) => {
        const figure = document.createElement("figure");
        figure.className = "gallery-card";
        figure.innerHTML = `
          <img src="${photo.src}" alt="${escapeHtml(photo.alt)}" loading="lazy" />
          <figcaption class="gallery-caption">${escapeHtml(photo.caption)}</figcaption>
        `;
        gallery.appendChild(figure);
      });
    }

    function updateMapFocus(dayIndex) {
      mapLayers.forEach((layer, index) => {
        const isActive = index === dayIndex;
        layer.polyline.setStyle({
          weight: isActive ? 5 : 3,
          opacity: isActive ? 0.92 : 0.25
        });
        layer.markers.forEach((marker) => marker.setOpacity(isActive ? 1 : 0.42));
      });
      map.flyToBounds(mapLayers[dayIndex].bounds, getFitOptions());
    }

    function renderDayTabs() {
      dayTabs.innerHTML = "";
      data.days.forEach((day, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `day-tab${index === activeDay ? " is-active" : ""}`;
        button.style.setProperty("--day-color", day.color);
        button.setAttribute("aria-label", `切换到 Day ${day.order}`);
        button.innerHTML = `<span class="day-tab-label">DAY ${day.order}</span>`;
        button.addEventListener("click", () => {
          if (panelState.collapsed) snapPanel(false);
          setActiveDay(index);
        });
        dayTabs.appendChild(button);
      });
    }

    function setActiveDay(dayIndex) {
      activeDay = dayIndex;
      const day = data.days[dayIndex];
      document.documentElement.style.setProperty("--day-color", day.color);

      $("day-kicker").textContent = `${day.label} · ${day.kicker}`;
      $("day-title").textContent = day.title;
      $("day-summary").textContent = day.summary;
      $("crowd-badge").textContent = `人流 · ${day.crowd}`;
      $("mood-badge").textContent = `节奏 · ${day.mood}`;
      $("transport-note").textContent = day.transportNote;
      $("day-article").innerHTML = renderMarkdown(day.markdown);

      const dayRoute = $("day-route");
      dayRoute.innerHTML = "";
      day.route.forEach((stop) => {
        const span = document.createElement("span");
        span.className = "route-pill";
        span.textContent = stop;
        dayRoute.appendChild(span);
      });

      renderChips($("food-chips"), day.food);
      renderChips($("highlight-chips"), day.highlights);
      renderTransit(day.transit);
      renderGallery(day);
      renderDayTabs();
      updateMapFocus(dayIndex);
      dayTabs.children[dayIndex]?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }

    updatePanelMetrics();
    map.fitBounds(L.latLngBounds(allBounds), getFitOptions());
    setActiveDay(0);
  </script>
</body>
</html>
